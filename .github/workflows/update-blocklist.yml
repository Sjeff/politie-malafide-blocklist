name: Update Malafide Blocklist

on:
  schedule:
    # Draait elke dag om 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch: # Handmatige trigger mogelijk

permissions:
  contents: read

jobs:
  update-blocklist:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 pytest

    - name: Run tests
      run: |
        pytest test_update_blocklist.py -v

    - name: Scrape and update gist
      env:
        GITHUB_TOKEN: ${{ secrets.GIST_TOKEN }}
        GIST_ID: ${{ secrets.GIST_ID }}
      run: |
        python update_blocklist.py